<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUMINO — 照明業界ニュースダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="lumino-bg">
    <div class="lumino-glow"></div>
    <div class="lumino-wrap">

      <!-- HEADER -->
      <header class="lumino-header">
        <div class="lumino-brand">
          <div class="lumino-logo"><div class="lumino-logo-dot"></div></div>
          <div>
            <div class="lumino-wordmark">LUMINO</div>
            <div class="lumino-subtitle">照明業界ニュースダッシュボード</div>
          </div>
        </div>
        <div class="lumino-header-right">
          <div class="lumino-updated">
            <div class="lumino-updated-label">Last updated</div>
            <div class="lumino-updated-time" id="lastUpdated">2026.06.19  08:42</div>
          </div>
          <button class="lumino-refresh" id="refreshBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" id="refreshIcon"><path d="M21 12a9 9 0 1 1-2.64-6.36"></path><path d="M21 3v5h-5"></path></svg>
            更新
          </button>
        </div>
      </header>

      <!-- FEATURED HERO -->
      <section class="lumino-hero-section">
        <div class="lumino-hero-heading">
          <span class="lumino-dot"></span>
          <span class="lumino-featured-label">FEATURED</span>
          <span class="lumino-featured-sub">おすすめ記事</span>
        </div>
        <div class="lumino-hero-frame">
          <div class="lumino-hero-track" id="heroTrack"></div>
          <div class="lumino-dots" id="heroDots"></div>
        </div>
      </section>

      <!-- CATEGORY TABS + SEARCH -->
      <div class="lumino-toolbar">
        <nav class="lumino-tabs" id="categoryTabs"></nav>
        <div class="lumino-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c859b" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" class="lumino-search-icon"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path></svg>
          <input type="text" id="searchInput" class="lumino-search-input" placeholder="記事を検索…">
          <button type="button" id="searchClearBtn" class="lumino-search-clear" aria-label="クリア" hidden>×</button>
        </div>
      </div>

      <!-- RESULT META -->
      <section class="lumino-meta">
        <span><span class="lumino-meta-value" id="nArticles">0</span> 件</span>
        <span class="lumino-meta-sep"></span>
        <span><span id="nSources">0</span> ソース</span>
        <span class="lumino-meta-sep"></span>
        <span class="lumino-meta-today"><span class="lumino-dot"></span>今日の新着 <span id="nToday">0</span> 件</span>
      </section>

      <!-- NEWS GRID -->
      <main class="lumino-main">
        <div class="lumino-grid" id="skeletonGrid" hidden></div>
        <div class="lumino-grid" id="newsGrid"></div>
        <div class="lumino-empty" id="emptyState" hidden>
          <div class="lumino-empty-icon">🔍</div>
          <div class="lumino-empty-title">該当する記事が見つかりませんでした</div>
          <div class="lumino-empty-sub">キーワードやカテゴリを変えてお試しください。</div>
          <button type="button" class="lumino-empty-reset" id="emptyResetBtn">条件をリセット</button>
        </div>
      </main>

    </div>
  </div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
