name: Fetch LUMINO News

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分（UTC）= 日本時間の毎時0分
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python fetch_news.py

      - name: Commit and push data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.js; then
            git add data.js
            git commit -m "data.js update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to data.js"
          fi
